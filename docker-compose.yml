services:
  cortex-bot:
    build: .
    env_file: .env
    container_name: cortex
    environment:
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
    # Linux: host.docker.internal is not defined by default
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - cortex-data:/app/data
    restart: unless-stopped
    networks:
      - cortex-net
      
networks:
  cortex-net:
    name: cortex-net
    driver: bridge

volumes:
  cortex-data:
    name: cortex-data
    external: true

